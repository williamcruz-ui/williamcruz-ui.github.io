<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BichoVivo - Tamagotchi</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:linear-gradient(160deg,#2D1B69 0%,#1a0533 100%);
    color:#e8dff5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
  }
  #root{width:100%;max-width:420px;margin:0 auto;padding:12px}

  /* Floating emote animation */
  @keyframes floatUp{
    0%{opacity:1;transform:translateY(0) scale(1)}
    60%{opacity:0.8;transform:translateY(-60px) scale(1.2)}
    100%{opacity:0;transform:translateY(-110px) scale(0.8)}
  }
  .emote-float{
    position:absolute;
    font-size:28px;
    pointer-events:none;
    animation:floatUp 1.2s ease-out forwards;
    z-index:100;
  }

  /* Breathing animation */
  @keyframes breathe{
    0%,100%{transform:scaleY(1) scaleX(1)}
    50%{transform:scaleY(1.04) scaleX(0.97)}
  }
  @keyframes sway{
    0%,100%{transform:rotate(0deg)}
    25%{transform:rotate(2deg)}
    75%{transform:rotate(-2deg)}
  }
  @keyframes bounce{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-12px)}
  }
  @keyframes sleepBob{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(4px)}
  }
  @keyframes floatZ{
    0%{opacity:1;transform:translate(0,0) rotate(0deg) scale(0.8)}
    100%{opacity:0;transform:translate(20px,-40px) rotate(20deg) scale(1.3)}
  }
  @keyframes deadShake{
    0%,100%{transform:rotate(0deg)}
    25%{transform:rotate(-5deg)}
    75%{transform:rotate(5deg)}
  }
  @keyframes pulse{
    0%,100%{opacity:0.7}
    50%{opacity:1}
  }
  @keyframes modalIn{
    from{opacity:0;transform:scale(0.85)}
    to{opacity:1;transform:scale(1)}
  }
  @keyframes barStripe{
    0%{background-position:0 0}
    100%{background-position:20px 0}
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ================================================================
   CONSTANTS
   ================================================================ */
const DECAY_INTERVAL = 3000;
const SLEEP_DURATION = 3000;
const SAVE_KEY = 'bichovivo_save';

const TEMPERAMENTS = [
  {
    id: 'brincalhao', name: 'Brincalhao',
    desc: 'Adora brincar, mas cansa rapido.',
    decay: { saciedade: 3, felicidade: 1.5, energia: 4, higiene: 2.5 },
    bonuses: {}
  },
  {
    id: 'tranquilo', name: 'Tranquilo',
    desc: 'Calmo e equilibrado.',
    decay: { saciedade: 2, felicidade: 2, energia: 2, higiene: 2 },
    bonuses: {}
  },
  {
    id: 'resmungao', name: 'Resmungao',
    desc: 'Dificil de agradar.',
    decay: { saciedade: 3, felicidade: 4, energia: 2.5, higiene: 2.5 },
    bonuses: {}
  },
  {
    id: 'carente', name: 'Carente',
    desc: 'Precisa de muito carinho.',
    decay: { saciedade: 2.5, felicidade: 5, energia: 2.5, higiene: 2.5 },
    bonuses: { carinho: 10 }
  }
];

const STAGES = [
  { name: 'Filhote', minTime: 0, scale: 0.7 },
  { name: 'Crianca', minTime: 2 * 60 * 1000, scale: 0.85 },
  { name: 'Jovem', minTime: 5 * 60 * 1000, scale: 1.0 },
  { name: 'Adulto', minTime: 10 * 60 * 1000, scale: 1.15 }
];

function clamp(v, lo = 0, hi = 100) { return Math.max(lo, Math.min(hi, v)); }

function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function formatTime(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}m ${sec < 10 ? '0' : ''}${sec}s`;
}

/* ================================================================
   SOUND ENGINE (Web Audio API)
   ================================================================ */
function useSoundEngine() {
  const ctxRef = useRef(null);
  const mutedRef = useRef(false);
  const [muted, setMuted] = useState(false);

  const ensureCtx = useCallback(() => {
    if (!ctxRef.current) {
      ctxRef.current = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (ctxRef.current.state === 'suspended') {
      ctxRef.current.resume();
    }
    return ctxRef.current;
  }, []);

  const playTone = useCallback((freq, duration, type = 'sine', ramp = false) => {
    if (mutedRef.current) return;
    try {
      const ctx = ensureCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      if (ramp) {
        osc.frequency.linearRampToValueAtTime(freq * 1.5, ctx.currentTime + duration);
      }
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + duration);
    } catch (e) { /* silent fail */ }
  }, [ensureCtx]);

  const sounds = useMemo(() => ({
    feed: () => { playTone(220, 0.15, 'triangle'); setTimeout(() => playTone(260, 0.12, 'triangle'), 100); },
    play: () => { playTone(400, 0.1, 'square'); setTimeout(() => playTone(500, 0.1, 'square'), 80); setTimeout(() => playTone(630, 0.15, 'square'), 160); },
    sleep: () => { playTone(180, 0.3, 'sine'); },
    clean: () => { playTone(600, 0.06, 'sawtooth'); setTimeout(() => playTone(800, 0.06, 'sawtooth'), 70); setTimeout(() => playTone(1000, 0.08, 'sawtooth'), 140); },
    love: () => { playTone(330, 0.15, 'sine', true); setTimeout(() => playTone(440, 0.2, 'sine'), 120); },
    death: () => { playTone(200, 0.3, 'sawtooth'); setTimeout(() => playTone(150, 0.4, 'sawtooth'), 250); },
    tap: () => { playTone(520, 0.08, 'sine'); }
  }), [playTone]);

  const toggleMute = useCallback(() => {
    mutedRef.current = !mutedRef.current;
    setMuted(m => !m);
  }, []);

  return { sounds, muted, toggleMute, ensureCtx };
}

/* ================================================================
   CREATURE SVG
   ================================================================ */
function CreatureSVG({ healthPct, stage, sleeping, dead, onClick, bouncing }) {
  const hue = dead ? 0 : healthPct > 60 ? 120 : healthPct > 30 ? 50 : 0;
  const sat = dead ? '0%' : '70%';
  const light = dead ? '50%' : '55%';
  const bodyColor = `hsl(${hue},${sat},${light})`;
  const bellyColor = dead ? '#888' : `hsl(${hue},60%,72%)`;
  const cheekColor = dead ? '#777' : '#ff9eaa';
  const scale = STAGES[stage].scale;

  const breathClass = dead ? '' : (sleeping ? 'sleepBob' : 'breathe');
  const containerStyle = {
    animation: dead
      ? 'deadShake 0.5s ease-in-out'
      : bouncing
        ? 'bounce 0.35s ease-out'
        : `${breathClass === 'breathe' ? 'breathe 2.5s ease-in-out infinite, sway 4s ease-in-out infinite' : breathClass === 'sleepBob' ? 'sleepBob 2s ease-in-out infinite' : 'none'}`,
    transformOrigin: 'center bottom',
    cursor: dead ? 'default' : 'pointer',
    position: 'relative',
    display: 'inline-block'
  };

  return (
    <div style={containerStyle} onClick={onClick}>
      <svg viewBox="0 0 200 200" width={160 * scale} height={160 * scale} xmlns="http://www.w3.org/2000/svg">
        {/* Ears */}
        <ellipse cx="60" cy="50" rx="20" ry="30" fill={bodyColor} />
        <ellipse cx="60" cy="50" rx="12" ry="20" fill={bellyColor} />
        <ellipse cx="140" cy="50" rx="20" ry="30" fill={bodyColor} />
        <ellipse cx="140" cy="50" rx="12" ry="20" fill={bellyColor} />
        {/* Body */}
        <ellipse cx="100" cy="120" rx="55" ry="50" fill={bodyColor} />
        {/* Belly */}
        <ellipse cx="100" cy="130" rx="35" ry="30" fill={bellyColor} />
        {/* Arms */}
        <ellipse cx="48" cy="115" rx="12" ry="18" fill={bodyColor} transform="rotate(-15 48 115)" />
        <ellipse cx="152" cy="115" rx="12" ry="18" fill={bodyColor} transform="rotate(15 152 115)" />
        {/* Feet */}
        <ellipse cx="78" cy="168" rx="16" ry="10" fill={bodyColor} />
        <ellipse cx="122" cy="168" rx="16" ry="10" fill={bodyColor} />
        {/* Head */}
        <circle cx="100" cy="80" r="40" fill={bodyColor} />
        {/* Face */}
        {dead ? (
          <>
            {/* X eyes */}
            <line x1="82" y1="70" x2="92" y2="80" stroke="#333" strokeWidth="3" strokeLinecap="round" />
            <line x1="92" y1="70" x2="82" y2="80" stroke="#333" strokeWidth="3" strokeLinecap="round" />
            <line x1="108" y1="70" x2="118" y2="80" stroke="#333" strokeWidth="3" strokeLinecap="round" />
            <line x1="118" y1="70" x2="108" y2="80" stroke="#333" strokeWidth="3" strokeLinecap="round" />
            {/* Frown */}
            <path d="M85 98 Q100 90 115 98" fill="none" stroke="#333" strokeWidth="2.5" strokeLinecap="round" />
          </>
        ) : sleeping ? (
          <>
            {/* Closed eyes */}
            <path d="M80 76 Q87 72 94 76" fill="none" stroke="#333" strokeWidth="2.5" strokeLinecap="round" />
            <path d="M106 76 Q113 72 120 76" fill="none" stroke="#333" strokeWidth="2.5" strokeLinecap="round" />
            {/* Sleepy mouth */}
            <ellipse cx="100" cy="94" rx="4" ry="3" fill="#333" />
          </>
        ) : (
          <>
            {/* Eyes */}
            <circle cx="87" cy="74" r="6" fill="#fff" />
            <circle cx="113" cy="74" r="6" fill="#fff" />
            <circle cx="89" cy="73" r="3" fill="#222" />
            <circle cx="115" cy="73" r="3" fill="#222" />
            {/* Eye shine */}
            <circle cx="90.5" cy="71.5" r="1.2" fill="#fff" />
            <circle cx="116.5" cy="71.5" r="1.2" fill="#fff" />
            {/* Cheeks */}
            <ellipse cx="74" cy="84" rx="8" ry="5" fill={cheekColor} opacity="0.5" />
            <ellipse cx="126" cy="84" rx="8" ry="5" fill={cheekColor} opacity="0.5" />
            {/* Mouth */}
            <path d="M92 92 Q100 100 108 92" fill="none" stroke="#333" strokeWidth="2" strokeLinecap="round" />
          </>
        )}
      </svg>
    </div>
  );
}

/* ================================================================
   STAT BAR
   ================================================================ */
function StatBar({ label, value, color, icon }) {
  const barBg = value > 50 ? color : value > 25 ? '#e6a817' : '#e04040';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 8,
      background: 'rgba(255,255,255,0.07)', borderRadius: 20,
      padding: '6px 12px', minWidth: 0
    }}>
      <span style={{ fontSize: 16, flexShrink: 0 }}>{icon}</span>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, marginBottom: 3, color: '#c4b5e0' }}>
          <span>{label}</span>
          <span>{Math.round(value)}</span>
        </div>
        <div style={{ height: 8, borderRadius: 4, background: 'rgba(0,0,0,0.3)', overflow: 'hidden' }}>
          <div style={{
            width: `${value}%`, height: '100%', borderRadius: 4,
            background: `linear-gradient(90deg, ${barBg}, ${barBg}cc)`,
            transition: 'width 0.4s ease, background 0.4s ease',
            backgroundSize: value > 50 ? '20px 8px' : undefined,
            backgroundImage: value > 50 ? `repeating-linear-gradient(90deg, transparent, transparent 8px, rgba(255,255,255,0.08) 8px, rgba(255,255,255,0.08) 16px)` : undefined,
            animation: value > 50 ? 'barStripe 0.8s linear infinite' : undefined
          }} />
        </div>
      </div>
    </div>
  );
}

/* ================================================================
   ACTION BUTTON
   ================================================================ */
function ActionButton({ label, icon, onClick, disabled, color }) {
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      style={{
        background: disabled ? 'rgba(255,255,255,0.05)' : `linear-gradient(135deg, ${color}dd, ${color}88)`,
        color: disabled ? '#666' : '#fff',
        border: 'none',
        borderRadius: 14,
        padding: '12px 8px',
        fontSize: 13,
        fontWeight: 600,
        cursor: disabled ? 'not-allowed' : 'pointer',
        display: 'flex',
        flexDirection: 'column',
        alignItems: 'center',
        gap: 4,
        transition: 'transform 0.15s, box-shadow 0.15s',
        boxShadow: disabled ? 'none' : `0 4px 12px ${color}44`,
        transform: 'scale(1)',
        width: '100%'
      }}
      onMouseDown={e => { if (!disabled) e.currentTarget.style.transform = 'scale(0.93)'; }}
      onMouseUp={e => { e.currentTarget.style.transform = 'scale(1)'; }}
      onMouseLeave={e => { e.currentTarget.style.transform = 'scale(1)'; }}
    >
      <span style={{ fontSize: 20 }}>{icon}</span>
      <span>{label}</span>
    </button>
  );
}

/* ================================================================
   FLOATING EMOTE
   ================================================================ */
function FloatingEmote({ emote, id }) {
  return (
    <div
      key={id}
      className="emote-float"
      style={{
        left: `${40 + Math.random() * 40}%`,
        top: '30%'
      }}
    >
      {emote}
    </div>
  );
}

/* ================================================================
   INFO MODAL
   ================================================================ */
function InfoModal({ onClose, temperament, stage, createdAt }) {
  const alive = Date.now() - createdAt;
  return (
    <div style={{
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.6)',
      display: 'flex', justifyContent: 'center', alignItems: 'center',
      zIndex: 200
    }} onClick={onClose}>
      <div
        style={{
          background: 'linear-gradient(135deg, #3a2078, #2a1558)',
          borderRadius: 20, padding: 28, maxWidth: 320, width: '90%',
          boxShadow: '0 12px 40px rgba(0,0,0,0.5)',
          border: '1px solid rgba(255,255,255,0.1)',
          animation: 'modalIn 0.25s ease-out'
        }}
        onClick={e => e.stopPropagation()}
      >
        <h3 style={{ textAlign: 'center', marginBottom: 18, fontSize: 18, color: '#d4bfff' }}>Informacoes</h3>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12, fontSize: 14 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between' }}>
            <span style={{ color: '#a893cc' }}>Tempo de vida:</span>
            <span style={{ fontWeight: 600 }}>{formatTime(alive)}</span>
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between' }}>
            <span style={{ color: '#a893cc' }}>Estagio:</span>
            <span style={{ fontWeight: 600 }}>{STAGES[stage].name}</span>
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between' }}>
            <span style={{ color: '#a893cc' }}>Temperamento:</span>
            <span style={{ fontWeight: 600 }}>{temperament.name}</span>
          </div>
          <div style={{ fontSize: 12, color: '#9a85b8', fontStyle: 'italic', textAlign: 'center', marginTop: 4 }}>
            {temperament.desc}
          </div>
        </div>
        <button
          onClick={onClose}
          style={{
            display: 'block', margin: '20px auto 0', background: '#6c3fcf',
            color: '#fff', border: 'none', borderRadius: 10, padding: '10px 32px',
            fontSize: 14, fontWeight: 600, cursor: 'pointer'
          }}
        >
          Fechar
        </button>
      </div>
    </div>
  );
}

/* Emote characters */
const EMOTES = {
  feed: '\u{1F34E}',
  play: '\u{2B50}',
  sleep: 'Z',
  clean: '\u{2728}',
  love: '\u{1F497}',
  tap: '\u{1F496}'
};

/* ================================================================
   MAIN APP
   ================================================================ */
function App() {
  /* --- Load saved game --- */
  const loadSave = () => {
    try {
      const raw = localStorage.getItem(SAVE_KEY);
      if (raw) {
        const data = JSON.parse(raw);
        if (data && typeof data.saciedade === 'number') {
          return data;
        }
      }
    } catch (e) { /* ignore */ }
    return null;
  };

  const createNew = () => {
    const t = pickRandom(TEMPERAMENTS);
    return {
      saciedade: 80,
      felicidade: 80,
      energia: 80,
      higiene: 80,
      temperament: t.id,
      createdAt: Date.now()
    };
  };

  const saved = loadSave();
  const initial = saved || createNew();

  const [saciedade, setSaciedade] = useState(initial.saciedade);
  const [felicidade, setFelicidade] = useState(initial.felicidade);
  const [energia, setEnergia] = useState(initial.energia);
  const [higiene, setHigiene] = useState(initial.higiene);
  const [temperamentId, setTemperamentId] = useState(initial.temperament);
  const [createdAt, setCreatedAt] = useState(initial.createdAt);

  const [sleeping, setSleeping] = useState(false);
  const [dead, setDead] = useState(false);
  const [emotes, setEmotes] = useState([]);
  const [showInfo, setShowInfo] = useState(false);
  const [bouncing, setBouncing] = useState(false);
  const [now, setNow] = useState(Date.now());

  const emoteIdRef = useRef(0);

  const { sounds, muted, toggleMute, ensureCtx } = useSoundEngine();

  const temperament = TEMPERAMENTS.find(t => t.id === temperamentId) || TEMPERAMENTS[0];

  /* --- Derived values --- */
  const saude = clamp(Math.round((saciedade + felicidade + energia + higiene) / 4));
  const alive = now - createdAt;
  const stage = STAGES.reduce((acc, s, i) => alive >= s.minTime ? i : acc, 0);

  /* --- Time ticker (for stage updates) --- */
  useEffect(() => {
    const id = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(id);
  }, []);

  /* --- Stat decay --- */
  useEffect(() => {
    if (dead) return;
    const id = setInterval(() => {
      const d = temperament.decay;
      if (sleeping) {
        setSaciedade(v => clamp(v - 1));
      } else {
        setSaciedade(v => clamp(v - d.saciedade));
        setFelicidade(v => clamp(v - d.felicidade));
        setEnergia(v => clamp(v - d.energia));
        setHigiene(v => clamp(v - d.higiene));
      }
    }, DECAY_INTERVAL);
    return () => clearInterval(id);
  }, [sleeping, dead, temperament]);

  /* --- Check death --- */
  useEffect(() => {
    if (saude <= 0 && !dead) {
      setDead(true);
      sounds.death();
    }
  }, [saude, dead, sounds]);

  /* --- Save to localStorage --- */
  useEffect(() => {
    const data = {
      saciedade, felicidade, energia, higiene,
      temperament: temperamentId,
      createdAt
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  }, [saciedade, felicidade, energia, higiene, temperamentId, createdAt]);

  /* --- Emote cleanup --- */
  useEffect(() => {
    if (emotes.length === 0) return;
    const id = setTimeout(() => {
      setEmotes(prev => prev.slice(1));
    }, 1300);
    return () => clearTimeout(id);
  }, [emotes]);

  /* --- Helpers --- */
  const spawnEmote = (type) => {
    emoteIdRef.current += 1;
    setEmotes(prev => [...prev, { emote: EMOTES[type], id: emoteIdRef.current }]);
  };

  const triggerBounce = () => {
    setBouncing(true);
    setTimeout(() => setBouncing(false), 350);
  };

  /* --- Actions --- */
  const doFeed = () => {
    if (dead || sleeping) return;
    ensureCtx();
    sounds.feed();
    setSaciedade(v => clamp(v + 25));
    setHigiene(v => clamp(v - 5));
    spawnEmote('feed');
    triggerBounce();
  };

  const doPlay = () => {
    if (dead || sleeping) return;
    ensureCtx();
    sounds.play();
    setFelicidade(v => clamp(v + 20));
    setEnergia(v => clamp(v - 15));
    setSaciedade(v => clamp(v - 10));
    spawnEmote('play');
    triggerBounce();
  };

  const doSleep = () => {
    if (dead || sleeping) return;
    ensureCtx();
    sounds.sleep();
    setSleeping(true);
    spawnEmote('sleep');
    setTimeout(() => {
      setEnergia(v => clamp(v + 30));
      setSaciedade(v => clamp(v - 10));
      setSleeping(false);
    }, SLEEP_DURATION);
  };

  const doClean = () => {
    if (dead || sleeping) return;
    ensureCtx();
    sounds.clean();
    setHigiene(v => clamp(v + 25));
    setFelicidade(v => clamp(v + 5));
    spawnEmote('clean');
    triggerBounce();
  };

  const doLove = () => {
    if (dead || sleeping) return;
    ensureCtx();
    sounds.love();
    const bonus = (temperament.bonuses && temperament.bonuses.carinho) || 0;
    setFelicidade(v => clamp(v + 15 + bonus));
    spawnEmote('love');
    triggerBounce();
  };

  const doInfo = () => {
    ensureCtx();
    setShowInfo(true);
  };

  const doRestart = () => {
    const n = createNew();
    setSaciedade(n.saciedade);
    setFelicidade(n.felicidade);
    setEnergia(n.energia);
    setHigiene(n.higiene);
    setTemperamentId(n.temperament);
    setCreatedAt(n.createdAt);
    setDead(false);
    setSleeping(false);
    setEmotes([]);
    setNow(Date.now());
  };

  const handleCreatureTap = () => {
    if (dead) return;
    ensureCtx();
    sounds.tap();
    spawnEmote('tap');
    triggerBounce();
  };

  /* --- Mood message --- */
  const getMood = () => {
    if (dead) return 'Desmaiei...';
    if (sleeping) return 'Zzz...';
    const lowCount = [saciedade, felicidade, energia, higiene].filter(v => v < 30).length;
    if (saude < 25) return 'Nao me sinto bem...';
    if (lowCount >= 3) return 'Estou irritado!';
    if (saciedade < 30) return 'Estou com fome...';
    if (felicidade < 30) return 'Estou triste...';
    if (energia < 30) return 'Estou cansado...';
    if (higiene < 30) return 'Preciso de um banho!';
    if (saciedade > 60 && felicidade > 60 && energia > 60 && higiene > 60) return 'Estou feliz!';
    return 'Tudo bem por aqui.';
  };

  const mood = getMood();
  const actionsDisabled = dead || sleeping;

  return (
    <div style={{ position: 'relative' }}>
      {/* Top bar */}
      <div style={{
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        marginBottom: 8, padding: '0 2px'
      }}>
        <a href="../" style={{
          color: '#a893cc', textDecoration: 'none', display: 'flex',
          alignItems: 'center', gap: 4, fontSize: 13, fontWeight: 500
        }}>
          {Icons.back} <span>BichoVivo</span>
        </a>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <span style={{
            fontSize: 11, color: '#8b76a8',
            background: 'rgba(255,255,255,0.06)', borderRadius: 8,
            padding: '3px 8px'
          }}>
            {STAGES[stage].name} &middot; {temperament.name}
          </span>
          <button
            onClick={toggleMute}
            style={{
              background: 'rgba(255,255,255,0.08)', border: 'none',
              borderRadius: 8, padding: '5px 7px', cursor: 'pointer',
              color: '#c4b5e0', display: 'flex', alignItems: 'center'
            }}
            title={muted ? 'Ativar som' : 'Silenciar'}
          >
            {muted ? Icons.speakerOff : Icons.speaker}
          </button>
        </div>
      </div>

      {/* Mood message */}
      <div style={{
        textAlign: 'center', fontSize: 16, fontWeight: 600,
        color: dead ? '#ff6b6b' : sleeping ? '#7c9aff' : '#d4bfff',
        marginBottom: 8, minHeight: 24,
        animation: (dead || saude < 25) ? 'pulse 1.5s infinite' : 'none'
      }}>
        {mood}
      </div>

      {/* Creature area */}
      <div style={{
        position: 'relative',
        display: 'flex', justifyContent: 'center', alignItems: 'center',
        minHeight: 200, marginBottom: 12
      }}>
        {/* Floating emotes */}
        {emotes.map(e => <FloatingEmote key={e.id} emote={e.emote} id={e.id} />)}

        {/* Sleep Z's */}
        {sleeping && (
          <>
            <div className="emote-float" style={{
              right: '25%', top: '15%',
              animation: 'floatZ 2s ease-out infinite',
              fontSize: 22, color: '#7c9aff', fontWeight: 700
            }}>Z</div>
            <div className="emote-float" style={{
              right: '20%', top: '25%',
              animation: 'floatZ 2s ease-out infinite 0.6s',
              fontSize: 16, color: '#7c9aff', fontWeight: 700
            }}>z</div>
            <div className="emote-float" style={{
              right: '30%', top: '10%',
              animation: 'floatZ 2s ease-out infinite 1.2s',
              fontSize: 12, color: '#7c9aff', fontWeight: 700
            }}>z</div>
          </>
        )}

        {/* Shadow */}
        <div style={{
          position: 'absolute', bottom: 10, left: '50%',
          transform: 'translateX(-50%)',
          width: 80 * STAGES[stage].scale,
          height: 12,
          background: 'radial-gradient(ellipse, rgba(0,0,0,0.3) 0%, transparent 70%)',
          borderRadius: '50%'
        }} />

        <CreatureSVG
          healthPct={saude}
          stage={stage}
          sleeping={sleeping}
          dead={dead}
          onClick={handleCreatureTap}
          bouncing={bouncing}
        />
      </div>

      {/* Stats */}
      <div style={{
        display: 'grid', gridTemplateColumns: '1fr 1fr',
        gap: 6, marginBottom: 14
      }}>
        <StatBar label="Saciedade" value={saciedade} color="#4ade80" icon={Icons.apple} />
        <StatBar label="Felicidade" value={felicidade} color="#f472b6" icon={Icons.heart} />
        <StatBar label="Energia" value={energia} color="#facc15" icon={Icons.sun} />
        <StatBar label="Higiene" value={higiene} color="#60a5fa" icon={Icons.droplet} />
        <div style={{ gridColumn: '1 / -1' }}>
          <StatBar label="Saude" value={saude} color="#34d399" icon={Icons.greenHeart} />
        </div>
      </div>

      {/* Action buttons */}
      {dead ? (
        <div style={{ textAlign: 'center' }}>
          <button
            onClick={doRestart}
            style={{
              background: 'linear-gradient(135deg, #8b5cf6, #6d28d9)',
              color: '#fff', border: 'none', borderRadius: 16,
              padding: '14px 40px', fontSize: 16, fontWeight: 700,
              cursor: 'pointer', boxShadow: '0 6px 20px rgba(109,40,217,0.4)'
            }}
          >
            Recomecar
          </button>
        </div>
      ) : (
        <div style={{
          display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)',
          gap: 8
        }}>
          <ActionButton label="Alimentar" icon={Icons.apple} onClick={doFeed} disabled={actionsDisabled} color="#22863a" />
          <ActionButton label="Brincar" icon={Icons.gamepad} onClick={doPlay} disabled={actionsDisabled} color="#8b5cf6" />
          <ActionButton label="Dormir" icon={Icons.moon} onClick={doSleep} disabled={actionsDisabled} color="#3b5998" />
          <ActionButton label="Limpar" icon={Icons.droplet} onClick={doClean} disabled={actionsDisabled} color="#2196f3" />
          <ActionButton label="Carinho" icon={Icons.heart} onClick={doLove} disabled={actionsDisabled} color="#e91e63" />
          <ActionButton label="Info" icon={Icons.info} onClick={doInfo} disabled={false} color="#555" />
        </div>
      )}

      {/* Back to portfolio */}
      <div style={{ textAlign: 'center', marginTop: 16 }}>
        <a href="../../" style={{
          color: '#6b5b8a', textDecoration: 'none', fontSize: 12
        }}>
          Voltar ao portfolio
        </a>
      </div>

      {/* Info modal */}
      {showInfo && (
        <InfoModal
          onClose={() => setShowInfo(false)}
          temperament={temperament}
          stage={stage}
          createdAt={createdAt}
        />
      )}
    </div>
  );
}

/* ================================================================
   MOUNT
   ================================================================ */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
