<!DOCTYPE html>

<head>
<meta charset="UTF-8" />

<title>BichoVivo - Tamagotchi</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',Helvetica,Arial,sans-serif;
    background:#f5f5f7;
    color:#1d1d1f;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }
  #root{width:100%;max-width:420px;margin:0 auto;padding:12px}

  /* Floating emote animation */
  @keyframes floatUp{
    0%{opacity:1;transform:translateY(0) scale(1)}
    60%{opacity:0.8;transform:translateY(-60px) scale(1.2)}
    100%{opacity:0;transform:translateY(-110px) scale(0.8)}
  }
  .emote-float{
    position:absolute;
    font-size:28px;
    pointer-events:none;
    animation:floatUp 1.2s ease-out forwards;
    z-index:100;
  }

  /* Creature animations */
  @keyframes breathe{
    0%,100%{transform:scaleY(1) scaleX(1)}
    50%{transform:scaleY(1.04) scaleX(0.97)}
  }
  @keyframes sway{
    0%,100%{transform:rotate(0deg)}
    25%{transform:rotate(2deg)}
    75%{transform:rotate(-2deg)}
  }
  @keyframes bounce{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-12px)}
  }
  @keyframes sleepBob{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(4px)}
  }
  @keyframes floatZ{
    0%{opacity:1;transform:translate(0,0) rotate(0deg) scale(0.8)}
    100%{opacity:0;transform:translate(20px,-40px) rotate(20deg) scale(1.3)}
  }
  @keyframes deadShake{
    0%,100%{transform:rotate(0deg)}
    25%{transform:rotate(-5deg)}
    75%{transform:rotate(5deg)}
  }
  @keyframes pulse{
    0%,100%{opacity:0.7}
    50%{opacity:1}
  }
  @keyframes modalIn{
    from{opacity:0;transform:scale(0.92) translateY(10px)}
    to{opacity:1;transform:scale(1) translateY(0)}
  }
  @keyframes modalBgIn{
    from{opacity:0}
    to{opacity:1}
  }
  @keyframes fadeIn{
    from{opacity:0;transform:translateY(8px)}
    to{opacity:1;transform:translateY(0)}
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    .emote-float,
    .creature-container {
      animation: none !important;
    }
    .emote-float { display: none; }
  }
</style>
</head>

/* ================================================================
   CONSTANTS
   ================================================================ */
const DECAY_INTERVAL = 3000;
const SLEEP_DURATION = 3000;
const SAVE_KEY = 'bichovivo_save';

const TEMPERAMENTS = [
  {
    id: 'brincalhao', name: 'Brincalhao',
    desc: 'Adora brincar, mas cansa rapido.',
    decay: { saciedade: 3, felicidade: 1.5, energia: 4, higiene: 2.5 },
    bonuses: {}

  {
    id: 'tranquilo', name: 'Tranquilo',
    desc: 'Calmo e equilibrado.',
    decay: { saciedade: 2, felicidade: 2, energia: 2, higiene: 2 },
    bonuses: {}
  },
  {
    id: 'resmungao', name: 'Resmungao',
    desc: 'Dificil de agradar.',
    decay: { saciedade: 3, felicidade: 4, energia: 2.5, higiene: 2.5 },
    bonuses: {}
  },
  {
    id: 'carente', name: 'Carente',
    desc: 'Precisa de muito carinho.',
    decay: { saciedade: 2.5, felicidade: 5, energia: 2.5, higiene: 2.5 },
    bonuses: { carinho: 10 }
  }
];

const STAGES = [
  { name: 'Filhote', minTime: 0, scale: 0.7 },
  { name: 'Crianca', minTime: 2 * 60 * 1000, scale: 0.85 },
  { name: 'Jovem', minTime: 5 * 60 * 1000, scale: 1.0 },
  { name: 'Adulto', minTime: 10 * 60 * 1000, scale: 1.15 }
];

function clamp(v, lo = 0, hi = 100) { return Math.max(lo, Math.min(hi, v)); }

function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function formatTime(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}m ${sec < 10 ? '0' : ''}${sec}s`;
}

/* ================================================================
   SOUND ENGINE (Web Audio API)
   ================================================================ */
function useSoundEngine() {
  const ctxRef = useRef(null);
  const mutedRef = useRef(false);
  const [muted, setMuted] = useState(false);

  const ensureCtx = useCallback(() => {
    if (!ctxRef.current) {
      ctxRef.current = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (ctxRef.current.state === 'suspended') {
      ctxRef.current.resume();
    }
    return ctxRef.current;
  }, []);

  const playTone = useCallback((freq, duration, type = 'sine', ramp = false) => {
    if (mutedRef.current) return;
    try {
      const ctx = ensureCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      if (ramp) {
        osc.frequency.linearRampToValueAtTime(freq * 1.5, ctx.currentTime + duration);
      }
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + duration);
    } catch (e) { /* silent fail */ }
  }, [ensureCtx]);

  const sounds = useMemo(() => ({
    feed: () => { playTone(220, 0.15, 'triangle'); setTimeout(() => playTone(260, 0.12, 'triangle'), 100); },
    play: () => { playTone(400, 0.1, 'square'); setTimeout(() => playTone(500, 0.1, 'square'), 80); setTimeout(() => playTone(630, 0.15, 'square'), 160); },
    sleep: () => { playTone(180, 0.3, 'sine'); },
    clean: () => { playTone(600, 0.06, 'sawtooth'); setTimeout(() => playTone(800, 0.06, 'sawtooth'), 70); setTimeout(() => playTone(1000, 0.08, 'sawtooth'), 140); },
    love: () => { playTone(330, 0.15, 'sine', true); setTimeout(() => playTone(440, 0.2, 'sine'), 120); },
    death: () => { playTone(200, 0.3, 'sawtooth'); setTimeout(() => playTone(150, 0.4, 'sawtooth'), 250); },
    tap: () => { playTone(520, 0.08, 'sine'); }
  }), [playTone]);

  const toggleMute = useCallback(() => {
    mutedRef.current = !mutedRef.current;
    setMuted(m => !m);
  }, []);

  return { sounds, muted, toggleMute, ensureCtx };
}

/* ================================================================
   CREATURE SVG
   ================================================================ */
function CreatureSVG({ healthPct, stage, sleeping, dead, onClick, bouncing }) {
  const hue = dead ? 0 : healthPct > 60 ? 120 : healthPct > 30 ? 50 : 0;
  const sat = dead ? '0%' : '70%';
  const light = dead ? '50%' : '55%';
  const bodyColor = `hsl(${hue},${sat},${light})`;
  const bellyColor = dead ? '#888' : `hsl(${hue},60%,72%)`;
  const cheekColor = dead ? '#777' : '#ff9eaa';
  const scale = STAGES[stage].scale;

  const breathClass = dead ? '' : (sleeping ? 'sleepBob' : 'breathe');
  const containerStyle = {
    animation: dead
      ? 'deadShake 0.5s ease-in-out'
      : bouncing
        ? 'bounce 0.35s ease-out'
        : `${breathClass === 'breathe' ? 'breathe 2.5s ease-in-out infinite, sway 4s ease-in-out infinite' : breathClass === 'sleepBob' ? 'sleepBob 2s ease-in-out infinite' : 'none'}`,
    transformOrigin: 'center bottom',
    cursor: dead ? 'default' : 'pointer',
    position: 'relative',
    display: 'inline-block'
  };

  return (
    <div className="creature-container" style={containerStyle} onClick={onClick}>
      <svg viewBox="0 0 200 200" width={160 * scale} height={160 * scale} xmlns="http://www.w3.org/2000/svg">
        {/* Ears */}
        <ellipse cx="60" cy="50" rx="20" ry="30" fill={bodyColor} />
        <ellipse cx="60" cy="50" rx="12" ry="20" fill={bellyColor} />
        <ellipse cx="140" cy="50" rx="20" ry="30" fill={bodyColor} />
        <ellipse cx="140" cy="50" rx="12" ry="20" fill={bellyColor} />
        {/* Body */}
        <ellipse cx="100" cy="120" rx="55" ry="50" fill={bodyColor} />
        {/* Belly */}
        <ellipse cx="100" cy="130" rx="35" ry="30" fill={bellyColor} />
        {/* Arms */}
        <ellipse cx="48" cy="115" rx="12" ry="18" fill={bodyColor} transform="rotate(-15 48 115)" />
        <ellipse cx="152" cy="115" rx="12" ry="18" fill={bodyColor} transform="rotate(15 152 115)" />
        {/* Feet */}
        <ellipse cx="78" cy="168" rx="16" ry="10" fill={bodyColor} />
        <ellipse cx="122" cy="168" rx="16" ry="10" fill={bodyColor} />
        {/* Head */}
        <circle cx="100" cy="80" r="40" fill={bodyColor} />
        {/* Face */}
        {dead ? (
          <>
            <line x1="82" y1="70" x2="92" y2="80" stroke="#333" strokeWidth="3" strokeLinecap="round" />
            <line x1="92" y1="70" x2="82" y2="80" stroke="#333" strokeWidth="3" strokeLinecap="round" />
            <line x1="108" y1="70" x2="118" y2="80" stroke="#333" strokeWidth="3" strokeLinecap="round" />
            <line x1="118" y1="70" x2="108" y2="80" stroke="#333" strokeWidth="3" strokeLinecap="round" />
            <path d="M85 98 Q100 90 115 98" fill="none" stroke="#333" strokeWidth="2.5" strokeLinecap="round" />
          </>
        ) : sleeping ? (
          <>
            <path d="M80 76 Q87 72 94 76" fill="none" stroke="#333" strokeWidth="2.5" strokeLinecap="round" />
            <path d="M106 76 Q113 72 120 76" fill="none" stroke="#333" strokeWidth="2.5" strokeLinecap="round" />
            <ellipse cx="100" cy="94" rx="4" ry="3" fill="#333" />
          </>
        ) : (
          <>
            <circle cx="87" cy="74" r="6" fill="#fff" />
            <circle cx="113" cy="74" r="6" fill="#fff" />
            <circle cx="89" cy="73" r="3" fill="#222" />
            <circle cx="115" cy="73" r="3" fill="#222" />
            <circle cx="90.5" cy="71.5" r="1.2" fill="#fff" />
            <circle cx="116.5" cy="71.5" r="1.2" fill="#fff" />
            <ellipse cx="74" cy="84" rx="8" ry="5" fill={cheekColor} opacity="0.5" />
            <ellipse cx="126" cy="84" rx="8" ry="5" fill={cheekColor} opacity="0.5" />
            <path d="M92 92 Q100 100 108 92" fill="none" stroke="#333" strokeWidth="2" strokeLinecap="round" />
          </>
        )}
      </svg>
    </div>
  );
}

/* ================================================================
   STAT BAR (Apple-style)
   ================================================================ */
function StatBar({ label, value, color, icon }) {
  const barColor = value > 50 ? color : value > 25 ? T.orange : T.red;
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 10,
      padding: '8px 0', minWidth: 0
    }}>
      <div style={{
        width: 28, height: 28, borderRadius: 8,
        background: `${barColor}18`,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        flexShrink: 0, color: barColor
      }}>
        {icon}
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{
          display: 'flex', justifyContent: 'space-between',
          fontSize: 12, fontWeight: 500, marginBottom: 4
        }}>
          <span style={{ color: '#3a3a3c' }}>{label}</span>
          <span style={{ color: T.label, fontVariantNumeric: 'tabular-nums' }}>{Math.round(value)}</span>
        </div>
        <div style={{
          height: 6, borderRadius: T.barRadius,
          background: 'rgba(0,0,0,0.06)', overflow: 'hidden'
        }}>
          <div style={{
            width: `${value}%`, height: '100%',
            borderRadius: T.barRadius,
            background: barColor,
            transition: 'width 0.4s ease, background 0.4s ease'
          }} />
        </div>
      </div>
    </div>
  );
}

/* ================================================================
   ACTION BUTTON (Apple pill style)
   ================================================================ */
function ActionButton({ label, icon, onClick, disabled, color }) {
  const [pressed, setPressed] = useState(false);
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      onMouseDown={() => !disabled && setPressed(true)}
      onMouseUp={() => setPressed(false)}
      onMouseLeave={() => setPressed(false)}
      onTouchStart={() => !disabled && setPressed(true)}
      onTouchEnd={() => setPressed(false)}
      style={{
        background: disabled ? '#f2f2f7' : color,
        color: disabled ? '#c7c7cc' : '#fff',
        border: 'none',
        borderRadius: T.pillRadius,
        padding: '12px 8px',
        fontSize: 13,
        fontWeight: 600,
        fontFamily: 'inherit',
        cursor: disabled ? 'not-allowed' : 'pointer',
        display: 'flex',
        flexDirection: 'column',
        alignItems: 'center',
        gap: 4,
        transition: 'transform 0.2s cubic-bezier(0.25,1,0.5,1), opacity 0.15s',
        transform: pressed ? 'scale(0.94)' : 'scale(1)',
        opacity: pressed ? 0.85 : 1,
        width: '100%',
        WebkitTapHighlightColor: 'transparent',
        letterSpacing: '-0.01em'
      }}
    >
      <span style={{ display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{icon}</span>
      <span>{label}</span>
    </button>
  );
}

/* ================================================================
   FLOATING EMOTE
   ================================================================ */
function FloatingEmote({ emote, id }) {
  return (
    <div
      key={id}
      className="emote-float"
      style={{
        left: `${40 + Math.random() * 40}%`,
        top: '30%'
      }}
    >
      {emote}
    </div>
  );
}

/* ================================================================
   INFO MODAL (Apple sheet style)
   ================================================================ */
function InfoModal({ onClose, temperament, stage, createdAt }) {
  const alive = Date.now() - createdAt;
  const rows = [
    { label: 'Tempo de vida', value: formatTime(alive) },
    { label: 'Estagio', value: STAGES[stage].name },
    { label: 'Temperamento', value: temperament.name }
  ];
  return (
    <div style={{
      position: 'fixed', inset: 0,
      background: 'rgba(0,0,0,0.25)',
      backdropFilter: 'blur(8px)',
      WebkitBackdropFilter: 'blur(8px)',
      display: 'flex', justifyContent: 'center', alignItems: 'center',
      zIndex: 200,
      animation: 'modalBgIn 0.2s ease-out'
    }} onClick={onClose}>
      <div
        style={{
          background: 'rgba(255,255,255,0.96)',
          backdropFilter: 'blur(20px)',
          WebkitBackdropFilter: 'blur(20px)',
          borderRadius: 20, padding: '28px 24px', maxWidth: 320, width: '88%',
          boxShadow: '0 24px 80px rgba(0,0,0,0.12), 0 0 1px rgba(0,0,0,0.1)',
          animation: 'modalIn 0.3s cubic-bezier(0.25,1,0.5,1)'
        }}
        onClick={e => e.stopPropagation()}
      >
        <h3 style={{
          textAlign: 'center', marginBottom: 20, fontSize: 18,
          fontWeight: 700, color: '#1d1d1f', letterSpacing: '-0.02em'
        }}>Informacoes</h3>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>
          {rows.map((row, i) => (
            <div key={i} style={{
              display: 'flex', justifyContent: 'space-between', alignItems: 'center',
              padding: '12px 0',
              borderBottom: i < rows.length - 1 ? '1px solid rgba(0,0,0,0.06)' : 'none',
              fontSize: 15
            }}>
              <span style={{ color: T.label }}>{row.label}</span>
              <span style={{ fontWeight: 600, color: '#1d1d1f' }}>{row.value}</span>
            </div>
          ))}
        </div>
        <div style={{
          fontSize: 13, color: T.label, fontStyle: 'italic',
          textAlign: 'center', marginTop: 12, lineHeight: 1.4
        }}>
          {temperament.desc}
        </div>
        <button
          onClick={onClose}
          style={{
            display: 'block', margin: '20px auto 0',
            background: T.blue,
            color: '#fff', border: 'none', borderRadius: T.pillRadius,
            padding: '10px 36px',
            fontSize: 15, fontWeight: 600, fontFamily: 'inherit',
            cursor: 'pointer', letterSpacing: '-0.01em',
            WebkitTapHighlightColor: 'transparent'
          }}
        >
          Fechar
        </button>
      </div>
    </div>
  );
}

/* Emote characters */
const EMOTES = {
  feed: '\u{1F34E}',
  play: '\u{2B50}',
  sleep: 'Z',
  clean: '\u{2728}',
  love: '\u{1F497}',
  tap: '\u{1F496}'
};

/* ================================================================
   MAIN APP
   ================================================================ */
function App() {
  /* --- Load saved game --- */
  const loadSave = () => {
    try {
      const raw = localStorage.getItem(SAVE_KEY);
      if (raw) {
        const data = JSON.parse(raw);
        if (data && typeof data.saciedade === 'number') {
          return data;
        }
      }
    } catch (e) { /* ignore */ }
    return null;
  };

  const createNew = () => {
    const t = pickRandom(TEMPERAMENTS);
    return {
      saciedade: 80,
      felicidade: 80,
      energia: 80,
      higiene: 80,
      temperament: t.id,
      createdAt: Date.now()
    };
  };

  const saved = loadSave();
  const initial = saved || createNew();

  const [saciedade, setSaciedade] = useState(initial.saciedade);
  const [felicidade, setFelicidade] = useState(initial.felicidade);
  const [energia, setEnergia] = useState(initial.energia);
  const [higiene, setHigiene] = useState(initial.higiene);
  const [temperamentId, setTemperamentId] = useState(initial.temperament);
  const [createdAt, setCreatedAt] = useState(initial.createdAt);

  const [sleeping, setSleeping] = useState(false);
  const [dead, setDead] = useState(false);
  const [emotes, setEmotes] = useState([]);
  const [showInfo, setShowInfo] = useState(false);
  const [bouncing, setBouncing] = useState(false);
  const [now, setNow] = useState(Date.now());

  const emoteIdRef = useRef(0);

  const { sounds, muted, toggleMute, ensureCtx } = useSoundEngine();

  const temperament = TEMPERAMENTS.find(t => t.id === temperamentId) || TEMPERAMENTS[0];

  /* --- Derived values --- */
  const saude = clamp(Math.round((saciedade + felicidade + energia + higiene) / 4));
  const alive = now - createdAt;
  const stage = STAGES.reduce((acc, s, i) => alive >= s.minTime ? i : acc, 0);

  /* --- Time ticker (for stage updates) --- */
  useEffect(() => {
    const id = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(id);
  }, []);

  /* --- Stat decay --- */
  useEffect(() => {
    if (dead) return;
    const id = setInterval(() => {
      const d = temperament.decay;
      if (sleeping) {
        setSaciedade(v => clamp(v - 1));
      } else {
        setSaciedade(v => clamp(v - d.saciedade));
        setFelicidade(v => clamp(v - d.felicidade));
        setEnergia(v => clamp(v - d.energia));
        setHigiene(v => clamp(v - d.higiene));
      }
    }, DECAY_INTERVAL);
    return () => clearInterval(id);
  }, [sleeping, dead, temperament]);

  /* --- Check death --- */
  useEffect(() => {
    if (saude <= 0 && !dead) {
      setDead(true);
      sounds.death();
    }
  }, [saude, dead, sounds]);

  /* --- Save to localStorage --- */
  useEffect(() => {
    const data = {
      saciedade, felicidade, energia, higiene,
      temperament: temperamentId,
      createdAt
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  }, [saciedade, felicidade, energia, higiene, temperamentId, createdAt]);

  /* --- Emote cleanup --- */
  useEffect(() => {
    if (emotes.length === 0) return;
    const id = setTimeout(() => {
      setEmotes(prev => prev.slice(1));
    }, 1300);
    return () => clearTimeout(id);
  }, [emotes]);

  /* --- Helpers --- */
  const spawnEmote = (type) => {
    emoteIdRef.current += 1;
    setEmotes(prev => [...prev, { emote: EMOTES[type], id: emoteIdRef.current }]);
  };

  const triggerBounce = () => {
    setBouncing(true);
    setTimeout(() => setBouncing(false), 350);
  };

  /* --- Actions --- */
  const doFeed = () => {
    if (dead || sleeping) return;
    ensureCtx();
    sounds.feed();
    setSaciedade(v => clamp(v + 25));
    setHigiene(v => clamp(v - 5));
    spawnEmote('feed');
    triggerBounce();
  };

  const doPlay = () => {
    if (dead || sleeping) return;
    ensureCtx();
    sounds.play();
    setFelicidade(v => clamp(v + 20));
    setEnergia(v => clamp(v - 15));
    setSaciedade(v => clamp(v - 10));
    spawnEmote('play');
    triggerBounce();
  };

  const doSleep = () => {
    if (dead || sleeping) return;
    ensureCtx();
    sounds.sleep();
    setSleeping(true);
    spawnEmote('sleep');
    setTimeout(() => {
      setEnergia(v => clamp(v + 30));
      setSaciedade(v => clamp(v - 10));
      setSleeping(false);
    }, SLEEP_DURATION);
  };

  const doClean = () => {
    if (dead || sleeping) return;
    ensureCtx();
    sounds.clean();
    setHigiene(v => clamp(v + 25));
    setFelicidade(v => clamp(v + 5));
    spawnEmote('clean');
    triggerBounce();
  };

  const doLove = () => {
    if (dead || sleeping) return;
    ensureCtx();
    sounds.love();
    const bonus = (temperament.bonuses && temperament.bonuses.carinho) || 0;
    setFelicidade(v => clamp(v + 15 + bonus));
    spawnEmote('love');
    triggerBounce();
  };

  const doInfo = () => {
    ensureCtx();
    setShowInfo(true);
  };

  const doRestart = () => {
    const n = createNew();
    setSaciedade(n.saciedade);
    setFelicidade(n.felicidade);
    setEnergia(n.energia);
    setHigiene(n.higiene);
    setTemperamentId(n.temperament);
    setCreatedAt(n.createdAt);
    setDead(false);
    setSleeping(false);
    setEmotes([]);
    setNow(Date.now());
  };

  const handleCreatureTap = () => {
    if (dead) return;
    ensureCtx();
    sounds.tap();
    spawnEmote('tap');
    triggerBounce();
  };

  /* --- Mood message --- */
  const getMood = () => {
    if (dead) return 'Desmaiei...';
    if (sleeping) return 'Zzz...';
    const lowCount = [saciedade, felicidade, energia, higiene].filter(v => v < 30).length;
    if (saude < 25) return 'Nao me sinto bem...';
    if (lowCount >= 3) return 'Estou irritado!';
    if (saciedade < 30) return 'Estou com fome...';
    if (felicidade < 30) return 'Estou triste...';
    if (energia < 30) return 'Estou cansado...';
    if (higiene < 30) return 'Preciso de um banho!';
    if (saciedade > 60 && felicidade > 60 && energia > 60 && higiene > 60) return 'Estou feliz!';
    return 'Tudo bem por aqui.';
  };

  const mood = getMood();
  const actionsDisabled = dead || sleeping;

  /* Mood color */
  const moodColor = dead ? T.red
    : sleeping ? T.indigo
    : saude < 25 ? T.red
    : (saciedade < 30 || felicidade < 30 || energia < 30 || higiene < 30) ? T.orange
    : T.green;

  return (
    <div style={{
      background: T.deviceBg,
      borderRadius: T.deviceRadius,
      boxShadow: T.deviceShadow,
      padding: '16px 20px 20px',
      position: 'relative',
      overflow: 'hidden',
      animation: 'fadeIn 0.4s ease-out'
    }}>
      {/* Top navigation bar */}
      <div style={{
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        marginBottom: 4, padding: '0'
      }}>
        <a href="../" style={{
          color: T.blue, textDecoration: 'none', display: 'flex',
          alignItems: 'center', gap: 2, fontSize: 15, fontWeight: 400
        }}>
          {Icons.chevronLeft} <span>BichoVivo</span>
        </a>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <span style={{
            fontSize: 12, color: T.label, fontWeight: 500,
            letterSpacing: '-0.01em'
          }}>
            {STAGES[stage].name} &middot; {temperament.name}
          </span>
          <button
            onClick={toggleMute}
            aria-label={muted ? 'Ativar som' : 'Silenciar'}
            style={{
              background: 'none', border: 'none',
              padding: 4, cursor: 'pointer',
              color: muted ? T.secondaryLabel : T.label,
              display: 'flex', alignItems: 'center',
              borderRadius: 8,
              WebkitTapHighlightColor: 'transparent'
            }}
          >
            {muted ? Icons.speakerOff : Icons.speaker}
          </button>
        </div>
      </div>

      {/* Thin separator */}
      <div style={{
        height: 1, background: 'rgba(0,0,0,0.06)',
        margin: '0 -20px 12px', padding: 0
      }} />

      {/* Mood message */}
      <div style={{
        textAlign: 'center', fontSize: 17, fontWeight: 600,
        color: moodColor,
        marginBottom: 4, minHeight: 26,
        animation: (dead || saude < 25) ? 'pulse 1.5s infinite' : 'none',
        letterSpacing: '-0.02em'
      }}>
        {mood}
      </div>

      {/* Creature area */}
      <div style={{
        position: 'relative',
        display: 'flex', justifyContent: 'center', alignItems: 'center',
        minHeight: 190, marginBottom: 8,
        background: 'radial-gradient(ellipse at center bottom, rgba(0,0,0,0.02) 0%, transparent 70%)',
        borderRadius: 20
      }}>
        {/* Floating emotes */}
        {emotes.map(e => <FloatingEmote key={e.id} emote={e.emote} id={e.id} />)}

        {/* Sleep Z's */}
        {sleeping && (
          <>
            <div className="emote-float" style={{
              right: '25%', top: '15%',
              animation: 'floatZ 2s ease-out infinite',
              fontSize: 22, color: T.indigo, fontWeight: 700
            }}>Z</div>
            <div className="emote-float" style={{
              right: '20%', top: '25%',
              animation: 'floatZ 2s ease-out infinite 0.6s',
              fontSize: 16, color: T.indigo, fontWeight: 700
            }}>z</div>
            <div className="emote-float" style={{
              right: '30%', top: '10%',
              animation: 'floatZ 2s ease-out infinite 1.2s',
              fontSize: 12, color: T.indigo, fontWeight: 700
            }}>z</div>
          </>
        )}

        {/* Ground shadow */}
        <div style={{
          position: 'absolute', bottom: 12, left: '50%',
          transform: 'translateX(-50%)',
          width: 80 * STAGES[stage].scale,
          height: 10,
          background: 'radial-gradient(ellipse, rgba(0,0,0,0.1) 0%, transparent 70%)',
          borderRadius: '50%'
        }} />

        <CreatureSVG
          healthPct={saude}
          stage={stage}
          sleeping={sleeping}
          dead={dead}
          onClick={handleCreatureTap}
          bouncing={bouncing}
        />
      </div>

      {/* Stats card */}
      <div style={{
        background: '#f9f9fb',
        borderRadius: T.cardRadius,
        padding: '4px 16px',
        marginBottom: 16,
        border: `1px solid ${T.cardBorder}`
      }}>
        <StatBar label="Saciedade" value={saciedade} color={T.green} icon={Icons.apple} />
        <div style={{ height: 1, background: 'rgba(0,0,0,0.04)' }} />
        <StatBar label="Felicidade" value={felicidade} color={T.pink} icon={Icons.heart} />
        <div style={{ height: 1, background: 'rgba(0,0,0,0.04)' }} />
        <StatBar label="Energia" value={energia} color={T.yellow} icon={Icons.bolt} />
        <div style={{ height: 1, background: 'rgba(0,0,0,0.04)' }} />
        <StatBar label="Higiene" value={higiene} color={T.blue} icon={Icons.droplet} />
        <div style={{ height: 1, background: 'rgba(0,0,0,0.04)' }} />
        <StatBar label="Saude" value={saude} color={T.green} icon={Icons.plus} />
      </div>

      {/* Action buttons */}
      {dead ? (
        <div style={{ textAlign: 'center', padding: '8px 0' }}>
          <button
            onClick={doRestart}
            style={{
              background: T.blue,
              color: '#fff', border: 'none', borderRadius: T.pillRadius,
              padding: '14px 44px', fontSize: 17, fontWeight: 600,
              fontFamily: 'inherit',
              cursor: 'pointer',
              letterSpacing: '-0.02em',
              WebkitTapHighlightColor: 'transparent'
            }}
          >
            Recomecar
          </button>
        </div>
      ) : (
        <div style={{
          display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)',
          gap: 10
        }}>
          <ActionButton label="Alimentar" icon={Icons.apple}   onClick={doFeed}  disabled={actionsDisabled} color={T.green} />
          <ActionButton label="Brincar"   icon={Icons.gamepad} onClick={doPlay}  disabled={actionsDisabled} color={T.purple} />
          <ActionButton label="Dormir"    icon={Icons.moon}    onClick={doSleep} disabled={actionsDisabled} color={T.indigo} />
          <ActionButton label="Limpar"    icon={Icons.sparkles} onClick={doClean} disabled={actionsDisabled} color={T.blue} />
          <ActionButton label="Carinho"   icon={Icons.heartHand} onClick={doLove}  disabled={actionsDisabled} color={T.pink} />
          <ActionButton label="Info"      icon={Icons.info}    onClick={doInfo}  disabled={false} color={T.label} />
        </div>
      )}

      {/* Back to portfolio */}
      <div style={{ textAlign: 'center', marginTop: 16 }}>
        <a href="../../" style={{
          color: T.secondaryLabel, textDecoration: 'none', fontSize: 13,
          fontWeight: 400
        }}>
          Voltar ao portfolio
        </a>
      </div>

      {/* Info modal */}
      {showInfo && (
        <InfoModal
          onClose={() => setShowInfo(false)}
          temperament={temperament}
          stage={stage}
          createdAt={createdAt}
        />
      )}
    </div>
  );
}

/* ================================================================
   MOUNT
   ================================================================ */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
